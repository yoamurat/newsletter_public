name: Energy Intelligence Weekly Newsletter

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      editor_notes:
        description: 'Optional editorial notes for this edition'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv json-repair

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPANY_NAME:      ${{ vars.COMPANY_NAME }}
          MAX_COMPANIES:     ${{ vars.MAX_COMPANIES }}
          EDITOR_NOTES:      ${{ github.event.inputs.editor_notes || '' }}
        run: python send_newsletter.py

      - name: Publish to GitHub Pages
        run: |
          mkdir -p docs/archive
          ls output/
          NEWSLETTER=$(ls output/*_newsletter.html | head -1)
          echo "Publishing: $NEWSLETTER"
          cp "$NEWSLETTER" docs/index.html
          cp "$NEWSLETTER" docs/archive/$(date +%Y-%m-%d).html
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Newsletter $(date +%Y-%m-%d)" || true
          git push || true

      - name: Archive output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: output/
