name: Energy Intelligence Weekly Newsletter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish to GitHub Pages
        run: |
          mkdir -p docs/archive
          ls output/
          NEWSLETTER=$(ls output/*_newsletter.html 2>/dev/null | head -1)
          echo "Found: $NEWSLETTER"
          if [ -z "$NEWSLETTER" ]; then
            echo "No newsletter file found in output/"
            exit 1
          fi
          cp "$NEWSLETTER" docs/index.html
          cp "$NEWSLETTER" docs/archive/$(date +%Y-%m-%d).html
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Newsletter $(date +%Y-%m-%d)" || true
          git push || true
